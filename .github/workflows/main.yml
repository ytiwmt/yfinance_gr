name: GrowthRadar Test

on:
  workflow_dispatch:  # 手動実行（これがメイン）
  push:
    branches: [ main ]

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests pandas numpy

      - name: Run GrowthRadar
        env:
          WEBHOOK_URL_GROWTHRADAR: ${{ secrets.WEBHOOK_URL_GROWTHRADAR }}
        run: |
          python check_growthradar.py
